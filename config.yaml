# LLM（OpenAI 相容端點）。API key 不放這裡——放 api_key/llm.txt 或環境變數 llm_api_key。
llm:
  base_url: https://api.jamessu1201.com/v1
  text_model: qwen3-30b
  vision_model: qwen3.5-4b   # 多模態，看圖
  max_tokens: 1024
  history_turns: 6           # 短期上下文：每人每頻道保留幾輪
  history_ttl_minutes: 30    # 超過這時間沒講話就清掉上下文
  system_prompt: "你是 james and michael 的萬能機器人，請用繁體中文簡潔回答。"
  # 機器人互聊（/botchat）：只開放這個頻道，並節流 + 設上限避免燒爆 token。
  botchat_channel_id: 1520437840977330256
  botchat_delay_seconds: 4   # 每次回覆前停幾秒（可讀 + 限速）
  botchat_max_turns: 40      # 我方回幾輪後自動停（防忘了喊停）
  # 工具（function calling）：時間/計算、天氣、網路搜尋、查點數/queue。
  tools_enabled: true
  tool_max_rounds: 5         # 一次回答最多幾輪 tool 呼叫，防無限叫工具
