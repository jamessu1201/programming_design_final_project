services:
  dcbot:
    build: .
    image: dcbot:latest
    container_name: dcbot
    restart: unless-stopped
    init: true
    env_file: .env
    environment:
      - TZ=Asia/Taipei
    # Overlay the runtime data dirs from the HDD bind into /app (where the code
    # expects them by relative path). Everything else (code) is baked in the image.
    volumes:
      - /mnt/docker-data/dcbot/config.yaml:/app/config.yaml
      - /mnt/docker-data/dcbot/json:/app/json
      - /mnt/docker-data/dcbot/api_key:/app/api_key
      - /mnt/docker-data/dcbot/private:/app/private
      - /mnt/docker-data/dcbot/logs:/app/logs
    networks:
      - traefik
    # Dashboard (uvicorn on 0.0.0.0:8080 inside the container) is published by
    # Traefik on the `web` (:80) entrypoint; CT100 cloudflared fronts the public
    # https for dashboard.jamessu1201.com. Port 8080 is NOT published to the host
    # (Traefik already uses host :8080, and reaches us over the docker network).
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dcbot.entrypoints=web"
      - "traefik.http.routers.dcbot.rule=Host(`dashboard.jamessu1201.com`)"
      - "traefik.http.services.dcbot.loadbalancer.server.port=8080"

# CT108 apps LXC 既有的 Traefik 網路（與 moneybank/fb-watcher 共用）
networks:
  traefik:
    external: true
